blueprint:
  name: Smart Cover Control
  description: Automatically control cover based on desired position sensor.
  domain: automation
  input:
    room_cover:
      name: Cover Entity
      selector:
        entity:
          filter:
            - domain: cover
    desired_position_sensor:
      name: Desired Position Sensor
      description: Template sensor that calculates the desired cover position
      selector:
        entity:
          filter:
            - domain: sensor
    saved_position_helper:
      name: Target Position Helper
      description: input_number helper to store target cover position (create one per cover)
      selector:
        entity:
          filter:
            - domain: input_number
    last_automation_change_helper:
      name: Last Automation Change Helper
      description: input_datetime helper to track when automation last moved the cover (create one per cover)
      selector:
        entity:
          filter:
            - domain: input_datetime
    presence_sensor:
      name: Presence Sensor
      description: >
        Optional. If the room is occupied when the cover should open, opening
        is delayed until the room clears or 1 hour has passed.
      default:
      selector:
        entity:
          filter:
            - domain: binary_sensor
    window_entity:
      name: Window Entity
      description: >
        Optional. If the window is open or tilted, the presence wait is skipped
        and the cover opens immediately.
      default:
      selector:
        entity:
          filter:
            - domain: input_select
    manual_override_duration:
      name: Manual Override Duration (minutes)
      description: How long to respect manual changes before automation resumes
      default: 120
      selector:
        number:
          min: 5
          max: 480
          unit_of_measurement: "min"
    desired_position_delay:
      name: Desired Position Delay (seconds)
      description: How long the desired position must be stable before triggering
      default: 5
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: "s"
    presence_clear_delay:
      name: Presence Clear Delay (seconds)
      description: How long the room must be unoccupied before opening proceeds
      default: 180
      selector:
        number:
          min: 0
          max: 1800
          unit_of_measurement: "s"
    additional_trigger:
      name: Additional triggers
      description: Additional triggers for the automation
      default:
        - platform: template
          value_template: "{{ false }}"
      selector:
        trigger:

variables:
  room_cover: !input room_cover
  desired_position_sensor: !input desired_position_sensor
  saved_position_helper: !input saved_position_helper
  last_automation_change_helper: !input last_automation_change_helper
  manual_override_duration: !input manual_override_duration
  presence_sensor: !input presence_sensor
  window_entity: !input window_entity

  current_position: "{{ state_attr(room_cover, 'current_position') | int(0) }}"
  desired_position: >
    {% set val = states(desired_position_sensor) %}
    {% if val in ['unknown', 'unavailable', 'None', ''] %}
      {{ current_position }}
    {% else %}
      {{ val | int(current_position) }}
    {% endif %}

  is_manual_override: >
    {% set last_auto_state = states(last_automation_change_helper) %}
    {% if last_auto_state in ['unknown', 'unavailable', 'None', ''] %}
      false
    {% else %}
      {% set last_auto_ts = as_timestamp(last_auto_state, default=0) %}
      {% set cover_changed_ts = as_timestamp(states[room_cover].last_changed, default=0) %}
      {% set override_seconds = manual_override_duration * 60 %}
      {% set now_ts = now().timestamp() %}
      {% set was_manual = cover_changed_ts > (last_auto_ts + 60) %}
      {% set still_in_override = (now_ts - cover_changed_ts) < override_seconds %}
      {{ was_manual and still_in_override }}
    {% endif %}

mode: restart
max_exceeded: silent

trigger:
  - triggers: !input additional_trigger
  - platform: state
    entity_id: !input desired_position_sensor
    for:
      seconds: !input desired_position_delay
    id: desired_position_changed
  - platform: state
    entity_id: !input room_cover
    for:
      minutes: !input manual_override_duration
    id: override_expired
  - platform: state
    entity_id: !input window_entity
    to:
      - "Open"
      - "Tilted"
    id: window_opened

condition:
  - condition: template
    value_template: "{{ not is_manual_override }}"

action:
  # Update saved target position
  - service: input_number.set_value
    target:
      entity_id: !input saved_position_helper
    data:
      value: "{{ desired_position }}"

  # Skip if cover is already at the desired position
  - condition: template
    value_template: "{{ current_position != desired_position }}"

  # If opening and room is occupied, wait for it to clear (max 1 hour)
  - if:
      - condition: template
        value_template: >
          {{ desired_position > current_position
             and presence_sensor is not none
             and presence_sensor | string not in ['', 'None']
             and is_state(presence_sensor, 'on')
             and not (window_entity is not none
                      and window_entity | string not in ['', 'None']
                      and states(window_entity) in ['Open', 'Tilted']) }}
    then:
      - wait_for_trigger:
          - platform: template
            value_template: "{{ not is_state(presence_sensor | default(''), 'on') }}"
            for:
              seconds: !input presence_clear_delay
        timeout: "01:00:00"
        continue_on_timeout: true

  - service: input_datetime.set_datetime
    target:
      entity_id: !input last_automation_change_helper
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - service: cover.set_cover_position
    target:
      entity_id: !input room_cover
    data:
      position: "{{ desired_position }}"
